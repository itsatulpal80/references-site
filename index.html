<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meeting Invitation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 15px;
      max-width: 500px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 15px;
    }

    p {
      line-height: 1.6;
      opacity: 0.9;
    }

    .link {
      margin: 20px 0;
      word-break: break-all;
      color: #ffff;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #00ff88;
      color: black;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Project Review</h2>

    <p>
      Your requirement seems interesting and can be handled with a clear and efficient approach.
      There are a few aspects that can be structured in a way to improve overall performance and usability.
    </p>


    <!-- 🔥 Join Button -->
 

  </div>

</body>
</html>
