<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Meeting</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: #00ff88;
      color: black;
      font-weight: bold;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Join My Meeting</h1>
    <p>Click below to join the Google Meet</p>

    <!-- 🔥 Yahan apna Meet link daal -->
    <a href="https://meet.google.com/your-link-here" target="_blank" class="btn">
      Join Now
    </a>
  </div>

</body>
</html>
